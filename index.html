<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stemmen op - Hogentcup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-2">Stemmen op</h1>
            <p class="text-gray-500 text-lg">Hogentcup Voting System</p>
        </div>
        
        <!-- User Selection -->
        <div id="userSelection" class="max-w-lg mx-auto">
            <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Welkom bij het stemmen</h2>
                    <p class="text-gray-500">Selecteer je gebruiker om te beginnen</p>
                </div>
                <div class="space-y-4">
                    <select id="userSelect" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200 bg-gray-50">
                        <option value="">Kies een gebruiker...</option>
                    </select>
                    <button id="startVoting" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-4 rounded-xl hover:from-blue-700 hover:to-blue-800 transition duration-300 font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                        Begin met stemmen
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden max-w-5xl mx-auto">
            <!-- User Bar -->
            <div class="bg-gradient-to-r from-blue-600 via-blue-700 to-indigo-700 rounded-2xl p-5 mb-8 shadow-xl flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-blue-100 text-sm font-medium">Ingelogd als</p>
                        <p id="currentUserDisplay" class="text-white text-xl font-bold"></p>
                    </div>
                </div>
                <button id="logoutBtn" class="flex items-center space-x-2 bg-white/20 hover:bg-white/30 text-white px-5 py-2.5 rounded-xl transition duration-300 font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    <span>Uitloggen</span>
                </button>
            </div>
            
            <!-- Dashboard Title -->
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800 mb-2">Waar wil je op stemmen?</h2>
                <p class="text-gray-500">Kies een categorie om je stemmen uit te brengen</p>
            </div>
            
            <!-- Voting Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <button class="voting-option group bg-white rounded-2xl shadow-lg hover:shadow-2xl p-8 transition-all duration-300 border-2 border-transparent hover:border-blue-500 transform hover:-translate-y-1" data-category="algemeneThemas">
                    <div class="flex items-start space-x-4">
                        <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center group-hover:bg-blue-600 transition duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-600 group-hover:text-white transition duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
                            </svg>
                        </div>
                        <div class="flex-1 text-left">
                            <h3 class="text-2xl font-bold text-gray-800 mb-1 group-hover:text-blue-600 transition duration-300">Algemene Thema's</h3>
                            <p class="text-gray-500">Stem op je top 3</p>
                        </div>
                    </div>
                </button>
                
                <button class="voting-option group bg-white rounded-2xl shadow-lg hover:shadow-2xl p-8 transition-all duration-300 border-2 border-transparent hover:border-green-500 transform hover:-translate-y-1" data-category="rondeThemas">
                    <div class="flex items-start space-x-4">
                        <div class="w-14 h-14 bg-green-100 rounded-xl flex items-center justify-center group-hover:bg-green-600 transition duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-green-600 group-hover:text-white transition duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                            </svg>
                        </div>
                        <div class="flex-1 text-left">
                            <h3 class="text-2xl font-bold text-gray-800 mb-1 group-hover:text-green-600 transition duration-300">Ronde Thema's</h3>
                            <p class="text-gray-500">Stem op je top 15</p>
                        </div>
                    </div>
                </button>
                
                <button class="voting-option group bg-white rounded-2xl shadow-lg hover:shadow-2xl p-8 transition-all duration-300 border-2 border-transparent hover:border-purple-500 transform hover:-translate-y-1" data-category="tafelrondes">
                    <div class="flex items-start space-x-4">
                        <div class="w-14 h-14 bg-purple-100 rounded-xl flex items-center justify-center group-hover:bg-purple-600 transition duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-600 group-hover:text-white transition duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                            </svg>
                        </div>
                        <div class="flex-1 text-left">
                            <h3 class="text-2xl font-bold text-gray-800 mb-1 group-hover:text-purple-600 transition duration-300">Tafelrondes</h3>
                            <p class="text-gray-500">Stem op je top 5</p>
                        </div>
                    </div>
                </button>
                
                <button class="voting-option group bg-white rounded-2xl shadow-lg hover:shadow-2xl p-8 transition-all duration-300 border-2 border-transparent hover:border-orange-500 transform hover:-translate-y-1" data-category="schiftingsvragen">
                    <div class="flex items-start space-x-4">
                        <div class="w-14 h-14 bg-orange-100 rounded-xl flex items-center justify-center group-hover:bg-orange-600 transition duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-orange-600 group-hover:text-white transition duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <div class="flex-1 text-left">
                            <h3 class="text-2xl font-bold text-gray-800 mb-1 group-hover:text-orange-600 transition duration-300">Schiftingsvragen</h3>
                            <p class="text-gray-500">Stem op je top 2</p>
                        </div>
                    </div>
                </button>
            </div>
        </div>

        <!-- Voting Screen -->
        <div id="votingScreen" class="hidden max-w-4xl mx-auto bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h2 id="votingTitle" class="text-3xl font-bold text-gray-800"></h2>
                <button id="backToDashboard" class="flex items-center space-x-2 text-blue-600 hover:text-blue-800 font-medium transition duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span>Terug</span>
                </button>
            </div>
            <p id="votingDescription" class="text-gray-500 text-lg mb-6"></p>
            <div id="votingOptions" class="space-y-3"></div>
            <button id="submitVotes" class="mt-8 w-full bg-gradient-to-r from-green-600 to-green-700 text-white py-4 rounded-xl hover:from-green-700 hover:to-green-800 transition duration-300 font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                Stemmen opslaan
            </button>
        </div>

        <!-- Success Message -->
        <div id="successMessage" class="hidden max-w-md mx-auto">
            <div class="bg-white rounded-2xl shadow-xl p-8 text-center border border-green-200">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Stemmen opgeslagen!</h2>
                <p class="text-gray-500 mb-6">Je stemmen zijn succesvol opgeslagen.</p>
                <button id="backToDashboardFromSuccess" class="bg-gradient-to-r from-green-600 to-green-700 text-white py-3 px-8 rounded-xl hover:from-green-700 hover:to-green-800 transition duration-300 font-semibold shadow-lg hover:shadow-xl">
                    Terug naar dashboard
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
